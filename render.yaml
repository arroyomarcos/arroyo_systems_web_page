# Render deployment configuration for the FastAPI backend.
# Usage: connect this repository on https://render.com and Render will pick
# up this file automatically. You must still set env vars via the dashboard
# (see backend/.env.example).
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: arroyo-systems-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
